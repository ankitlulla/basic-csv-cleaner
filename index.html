<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Cleaner</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

    <div class="container">

        <h1>CSV Cleaner</h1>

        <p>
            Clean up CSV files before importing them into Excel or other spreadsheet tools.
        </p>

        <small>
            Files are processed locally in your browser.
        </small>

        <br><br>

        <input type="file" id="csvFile" accept=".csv">

        <h3>Cleanup Options</h3>

        <label>
            <input type="checkbox" id="duplicates" checked>
            Remove duplicate rows
        </label>

        <br>

        <label>
            <input type="checkbox" id="emptyRows" checked>
            Remove empty rows
        </label>

        <br>

        <label>
            <input type="checkbox" id="trim" checked>
            Trim extra whitespace
        </label>

        <br>

        <label>
            <input type="checkbox" id="emptyColumns" checked>
            Remove empty columns
        </label>

        <br><br>

        <button id="cleanBtn">
            Clean CSV
        </button>

        <br><br>

        <div id="summary"></div>

        <div id="tableContainer"></div>

        <br>

        <button id="downloadBtn" style="display:none;">
            Download Cleaned CSV
        </button>

    </div>

    <script src="script.js"></script>

</body>

</html>
