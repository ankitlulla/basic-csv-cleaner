<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Cleaner</title>

    <link rel="stylesheet" href="style.css">

    <!-- Papa Parse -->
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

<div class="container">

    <header class="hero">
        <h1>CSV Cleaner</h1>
        <p>
            Prepare CSV files before importing them into Excel,
            Power BI, or other spreadsheet tools.
        </p>
        <small>
            Files are processed locally in your browser.
        </small>
    </header>

    <section class="upload-section">

        <h2>Upload CSV</h2>

        <input
            type="file"
            id="csvFile"
            accept=".csv">

    </section>

    <section class="options-section">

        <h2>Cleanup Options</h2>

        <label>
            <input
                type="checkbox"
                id="duplicates"
                checked>

            Remove duplicate rows
        </label>

        <label>
            <input
                type="checkbox"
                id="emptyRows"
                checked>

            Remove empty rows
        </label>

        <label>
            <input
                type="checkbox"
                id="trim"
                checked>

            Trim extra whitespace
        </label>

        <label>
            <input
                type="checkbox"
                id="emptyColumns"
                checked>

            Remove empty columns
        </label>

        <button id="cleanBtn">
            Clean CSV
        </button>

    </section>

    <section id="summary"></section>

    <section class="preview-section">

        <h2>Preview</h2>

        <div id="tableContainer"></div>

    </section>

    <button
        id="downloadBtn"
        style="display:none;">
        Download Cleaned CSV
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
